<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
        .outer_layer{
            width: 500px;
            height: 400px;
            border: 3px solid red;
            background-color:rgb(224, 241, 241);

        }
        .cat_holder{
            height: 200px;
            width: 100px;
            background-image: url("catimg.jfif");
            animation: cat_run;
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }
        @keyframes cat_run{
            0%{ background-image: url("catimg.jfif");position: relative;top: 100px;left:0px}
            50%{ background-image: url("catimg.jfif");position: relative;top: 1px;left:150px}
            100%{ background-image: url("catimg.jfif");position: relative;top: 126px;left:334px}
        }

    </style>
</head>
<body>
    <div class="outer_layer">
        <div class="cat_holder">
        </div>
    </div>
</body>
</html>
