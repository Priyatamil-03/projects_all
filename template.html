    <style>
        *{
            margin:0;
            padding:0;

        .hero{

            padding: 10px 0;
            margin:auto;

        }

        .logo{
            width: 150px;
        }
        nav ul{
            display: flex;
            align-items: center;
        }
        nav ul li{

        }

            color: #fff;

            transition: 3s;

        .nav button:hover{

        }
        .login{
            background:transparent;
            border: 2px solid #bd0b0b;
            margin-right: 25px;
        }
        .login:hover{

            color: #787878;
            border-color: #ff7620;
        }
        .content{
            position:absolute;
            top:35%;
            left: 90px;
        }
        .h2{
            font-size: 100px;
            color: #fff;
            text-transform: uppercase;
            font-weight: 700;
        }
        .p{
            color: #fff;
            font-size: 11px;
            margin-top: 10px;
        }
        .content button{
            background: #ff7620;
            border: none;
            padding: 12px 55px;
            color: #fff;
            font-size: 15px;
            font-weight: 100;
            margin-top: 50px;
            transition: .3s;
        }
        .content button:hover{

        }
    </style>
</head>
