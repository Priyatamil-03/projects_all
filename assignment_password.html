<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
</head>
<body>
    <form>
        <div>
        <label>User name</label>
        <input type="text" name="username" id="username"/>
    </div>
    <div>
        <label>Password</label>
        <input type="password" name="password" id="password" />
    </div>
    <div>
        <label>confirm password</label>
        <input type="text" name="password" id="cpassword"/>
    </div>
    </form>
    <p id="password"></p>
    <div>
        <p id="passwordd_length">length minimum 8 characters</p>
        <p id="number">one number</p>
        <p id="lowerCase">one lowerCase</p>
        <p id="upperCase">one upperCase</p>
        <p id="symbols">one specialCharacters</p>
    </div>
     <script>
        document.getElementById("password").addEventListener("blur",function(e){
             let password=document.getElementById("password").value;
            function validatePassword(password){
                const errors=[];
                if(password.length<8){
                    errors.push(" Your password must be atleast 8 characters long.");
                }
                if(!(/[a-z]/.test(password))){
                   errors.push(" Your password must contain atleast one lowercase letter."); 
                    document.getElementById("lowerCase").style.color="green"
                }
                 if(!(/[A-Z]/.test(password))){
                   errors.push(" Your password must contain atleast one uppercase letter.");
                   document.getElementById("upperCase").style.color="green" 
                }
                 if(!(/[0-9]/.test(password))){
                   errors.push(" Your password must contain atleast one digit.");
                   document.getElementById("number").style.color="green" 
                }
                 if(!(/[!@#$%^&*~"',./(){}[]]/.test(password))){
                   errors.push(" Your password must contain atleast one special character."); 
                   document.getElementById("symbols").style.color="green"
                }
                if(errors.length>0){
                    document.getElementById("password").innerText=errors.join("\n");
                    return false;
                }
                return true;
                
            }
            validatePassword(password);
        })
    </script>
    
</body>
</html>
